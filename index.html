<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LandQR Viewer</title>

    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Widgets/widgets.css">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="app-layout">

        <div id="viewer"></div>

        <aside id="toolPanel">

            <h2>Imagery</h2>

            <p>
                Date:
                <span id="imageryDate">-</span>
            </p>

            <p>
                Provider:
                <span id="imageryProvider">-</span>
            </p>

            <p>
                Resolution:
                <span id="imageryResolution">-</span>
            </p>

        </aside>

    </div>

    <script src="js/config.js"></script>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Cesium.js"></script>

    <script src="js/earth.js"></script>

    <script src="js/metadata.js"></script>

    <script src="js/loader.js"></script>

    <script src="js/app.js"></script>

</body>
</html>
